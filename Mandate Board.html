  window.addEventListener('error', function(e) {

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);

    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');

            const reader = ds.readable.getReader();

            writer.close();

            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +

            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);

    console.error('Bundle unpack error:', err);
  }

ateOpacity: (menuOpen && !selected) ? '0.18' : '1',\n        labelTextEl: h('text', { textAnchor:'middle', y:13.5, fontSize:10.5, fontFamily:\"'Space Grotesk',sans-serif\", fontWeight:600, fill:labelColor, style:{letterSpacing:'.01em'} }, d.name),\n        showInsight,\n        chipEl: h('text', { textAnchor:'middle', y:3.2, fontSize:9, fontFamily:\"'Doto',monospace\", fontWeight:700, fill:'#ffffff' }, d.cat[0]),\n        chipX:(rr*0.78).toFixed(1), chipY:(-rr*0.78).toFixed(1),\n        select: () => this.setState({ selected: d.id, menuId: d.id }),\n      };\n    });\n\n    const sel = byId[this.state.selected] || byId['midtown'];\n    const selB = blocs[sel.bloc];\n    const infraColor = /protected/.test(sel.infra) && !/unprotected/.test(sel.infra) ? '#141414'\n                     : /unprotected/.test(sel.infra) ? '#ff2d2d'\n                     : /Unknown/.test(sel.infra) ? '#b4b4b4' : '#8a8a8a';\n\n    // ---- hexagon radial action menu ----\n    const hexPts = (cx, cy, rr) => {\n      let p = [];\n      for (let k = 0; k < 6; k++) {\n        const a = (-90 + 60 * k) * Math.PI / 180;\n        p.push((cx + rr * Math.cos(a)).toFixed(1) + ',' + (cy + rr * Math.sin(a)).toFixed(1));\n      }\n      return p.join(' ');\n    };\n    const mNode = byId[this.state.menuId];\n    let menu = { open: false, options: [] };\n    if (mNode) {\n      const mr = +(mNode.r * 0.6).toFixed(1);\n      const Dd = mr + 70, oR = 28;\n      const defs = [\n        { key:'visit',   label:'VISIT',   dx:0,   dy:-Dd, side:'top'    },\n        { key:'listen',  label:'LISTEN',  dx:Dd,  dy:0,   side:'right'  },\n        { key:'policy',  label:'POLICY',  dx:0,   dy:Dd,  side:'bottom' },\n        { key:'message', label:'MESSAGE', dx:-Dd, dy:0,   side:'left'   },\n      ];\n      menu = {\n        open: true,\n        cx: mNode.x, cy: mNode.y,\n        centralPoints: hexPts(mNode.x, mNode.y, mr + 9),\n        options: defs.map(o => {\n          const active = this.state.action === o.key;\n          const cx = mNode.x + o.dx, cy = mNode.y + o.dy;\n          const lblW = o.label.length * 8.2 + 16;\n          let lblCX = cx, lblCY = cy;\n          if (o.side === 'top')    lblCY = cy - oR - 17;\n          if (o.side === 'bottom') lblCY = cy + oR + 17;\n          if (o.side === 'left')   lblCX = cx - oR - 9 - lblW/2;\n          if (o.side === 'right')  lblCX = cx + oR + 9 + lblW/2;\n          return {\n            key:o.key, label:o.label,\n            cx, cy, points: hexPts(cx, cy, oR),\n            fill: active ? '#ff2d2d' : '#fafafa',\n            stroke: active ? '#ff2d2d' : '#111111',\n            sw: active ? 1.5 : 1.4,\n            dotFill: active ? '#ffffff' : '#111111',\n            lblW: +lblW.toFixed(1), lblX: +(lblCX - lblW/2).toFixed(1), lblY: +(lblCY - 10).toFixed(1),\n            lblTX: +lblCX.toFixed(1), lblTY: +(lblCY + 4).toFixed(1),\n            lblBg: active ? '#ff2d2d' : '#121212',\n            lblBd: active ? '#ff2d2d' : '#121212',\n            labelEl: React.createElement('text', { x:+lblCX.toFixed(1), y:+(lblCY+4).toFixed(1), textAnchor:'middle', fontSize:11.5, fontFamily:\"'Doto',monospace\", fontWeight:700, fill:'#ffffff', style:{letterSpacing:'.12em',pointerEvents:'none'} }, o.label),\n            set: () => this.setState({ action: o.key }),\n          };\n        }),\n      };\n    }\n\n    const blocBar = [\n      { name:'Working Families', c:'#1a1a1a', pct:'41%' },\n      { name:'Business', c:'#3d3d3d', pct:'57%' },\n      { name:'Real Estate', c:'#595959', pct:'63%' },\n      { name:'Progressives', c:'#777777', pct:'52%' },\n      { name:'Labor', c:'#2b2b2b', pct:'46%' },\n    ];\n\n    const checklist = [\n      { label:'Transit hub', tag:'MIDTOWN', done:true },\n      { label:'Health clinic', tag:'S.BRONX', done:true },\n      { label:'Cooling center', tag:'FORDHAM', done:true },\n      { label:'Seawall', tag:'LWR MAN', done:false },\n      { label:'Ferry terminal', tag:'MID-ISL', done:false },\n    ].map(c => ({\n      label:c.label, tag:c.tag,\n      mark: c.done ? '✓' : '',\n      ring: c.done ? '#141414' : 'rgba(0,0,0,0.25)',\n      fill: c.done ? '#141414' : 'transparent',\n      text: c.done ? '#1a1a1a' : '#8a8a8a',\n    }));\n\n    const modeDefs = [\n      { k:'coalition', label:'Coalition' },\n      { k:'trust',     label:'Trust' },\n      { k:'knowledge', label:'Knowledge' },\n      { k:'needs',     label:'Needs' },\n    ];\n    const modes = modeDefs.map(m => {\n      const active = mode === m.k;\n      return {\n        label:m.label, set:() => this.setState({ mode:m.k }),\n        bg: active ? '#ff2d2d' : 'transparent',\n        bd: active ? '#ff2d2d' : 'rgba(0,0,0,0.14)',\n        fg: active ? '#ffffff' : '#6e6e6e',\n      };\n    });\n\n    let legendTitle, legend;\n    if (mode === 'coalition') {\n      legendTitle = 'Constituency Bloc';\n      legend = Object.values(blocs).map(b => ({ c:b.c, o:'1', l:b.name }));\n    } else if (mode === 'trust') {\n      legendTitle = 'Local Trust';\n      legend = [\n        { c:'#141414', o:'1', l:'High · 65%+' },\n        { c:'#8a8a8a', o:'1', l:'Mixed · 45–64%' },\n        { c:'#ff2d2d', o:'1', l:'Low · under 45%' },\n      ];\n    } else if (mode === 'knowledge') {\n      legendTitle = 'Knowledge State';\n      legend = [\n        { c:'#141414', o:'1',    l:'Fresh · recently visited' },\n        { c:'#141414', o:'0.45', l:'Stale · fading' },\n        { c:'#141414', o:'0.14', l:'Blind · never visited' },\n      ];\n    } else {\n      legendTitle = 'Surfaced Needs';\n      legend = [\n        { c:'#141414', o:'1', l:'H — Housing' },\n        { c:'#141414', o:'1', l:'T — Transit' },\n        { c:'#141414', o:'1', l:'S — Safety' },\n        { c:'#141414', o:'1', l:'J — Jobs' },\n        { c:'#141414', o:'1', l:'V — Services' },\n      ];\n    }\n\n    return {\n      nodes, edges, menu, blocBar, checklist, modes, legend, legendTitle,\n      selName:sel.name, selBoro:sel.boro, selBlocName:selB.name, selBlocColor:selB.c,\n      selTrust:sel.trust, selTrustColor:trustColor(sel.trust),\n      selKnow:sel.know, selKnowWidth:sel.know+'%',\n      selConcern:sel.concern, selInfra:sel.infra, selInfraColor:infraColor, selPop:sel.pop,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Mandate Board.dc"}
