<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MANDATE — Blizzard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Color tokens ── */
    --bg: #080b10;
    --panel: rgba(12,16,22,.92);
    --panel-solid: #0e1218;
    --line: rgba(255,255,255,.08);
    --line-bright: rgba(255,255,255,.15);
    --ink: #dce2ec;
    --ink-bright: #f0f3f8;
    --mut: #5e6b80;
    --mut-light: #7d8a9e;

    /* Bloc colors */
    --working: #2fc3e8;
    --finance: #7c8cf8;
    --realestate: #ff6f67;
    --progressives: #ff5fa0;
    --labor: #ffc24d;

    /* Semantic */
    --good: #34d399;
    --bad: #ff5a52;
    --warn: #e8a83e;
    --accent: #c9a44c;
    --accent-dim: rgba(201,164,76,.15);
    --frost: #7eb8d4;

    /* ── Layout constants ── */
    --topbar-h: 38px;
    --blocbar-h: 26px;
    --bars-h: calc(var(--topbar-h) + var(--blocbar-h));
    --panel-inset: 12px;
    --panel-top: calc(var(--bars-h) + var(--panel-inset));
    --panel-w-left: 280px;
    --panel-w-right: 260px;
    --radius: 4px;
  }

  /* ── Reset ── */
  * { box-sizing: border-box; margin: 0 }
  html, body { height: 100%; overflow: hidden }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Space Grotesk", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ════════════════════════════════════════════
     STAGE — Z-index stack
     Map (1) → HUD (5) → Overlay (20)
  ════════════════════════════════════════════ */
  .stage { position: relative; width: 100%; height: 100vh; overflow: hidden }
  #game { position: absolute; inset: 0; z-index: 1 }
  #hud { position: absolute; inset: 0; z-index: 5; pointer-events: none }
  #hud > * { pointer-events: auto }
  #overlay { position: absolute; inset: 0; z-index: 20; pointer-events: none }
  #overlay > * { pointer-events: auto }

  /* ── Shared primitives ── */
  .fp-label {
    font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--mut); font-weight: 600;
  }
  .fp-val { font-family: "Space Mono", monospace; font-weight: 700 }
  .fp-rule { border: none; border-top: 1px solid var(--line); margin: 0; width: 100% }
  .fp-rule-accent { border: none; border-top: 1px solid rgba(201,164,76,.3); margin: 0; width: 100% }

  /* ════════════════════════════════════════════
     TOP BAR — Resource strip (in-car strip feel)
  ════════════════════════════════════════════ */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center;
    height: var(--topbar-h); padding: 0 14px;
    background: linear-gradient(180deg, rgba(8,11,16,.95), rgba(8,11,16,.82));
    border-bottom: 1px solid var(--line);
    z-index: 6;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 180px }
  .topbar-scenario {
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--mut-light); font-weight: 600;
  }
  .topbar-time {
    font-family: "Space Mono", monospace; font-size: 11px;
    color: var(--ink); font-weight: 700; letter-spacing: .06em;
  }
  .topbar-center {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 24px;
  }
  .topbar-res {
    display: flex; align-items: center; gap: 6px;
    font-family: "Space Mono", monospace; font-size: 12px; font-weight: 700;
  }
  .topbar-res .icon { font-size: 13px; opacity: .7 }
  .topbar-res.good { color: var(--good) }
  .topbar-res.bad { color: var(--bad) }
  .topbar-res.warn { color: var(--warn) }
  .topbar-right {
    display: flex; align-items: center; gap: 10px;
    min-width: 180px; justify-content: flex-end;
  }
  .topbar-temp {
    font-family: "Space Mono", monospace; font-size: 14px;
    font-weight: 700; color: var(--frost);
  }
  .topbar-weather-icon { font-size: 16px; color: var(--frost) }

  /* ════════════════════════════════════════════
     BLOC BAR — Coalition strip below topbar
  ════════════════════════════════════════════ */
  .blocbar {
    position: absolute; top: var(--topbar-h); left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    height: var(--blocbar-h); padding: 0 14px;
    background: rgba(8,11,16,.78);
    border-bottom: 1px solid var(--line);
    z-index: 6;
  }
  .blocbar-item { display: flex; align-items: center; gap: 5px; font-size: 10px }
  .blocbar-dot { width: 6px; height: 6px; border-radius: 50% }
  .blocbar-name { color: var(--mut); font-weight: 500; letter-spacing: .04em }
  .blocbar-val {
    font-family: "Space Mono", monospace; font-weight: 700;
    font-size: 10px; color: var(--ink);
  }

  /* ════════════════════════════════════════════
     LEFT PANEL — Objectives, countdown, checklist
  ════════════════════════════════════════════ */
  .objectives {
    position: absolute;
    top: var(--panel-top); left: var(--panel-inset);
    width: var(--panel-w-left);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    z-index: 6;
    max-height: calc(100vh - var(--panel-top) - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--line-bright) transparent;
  }
  .objectives::-webkit-scrollbar { width: 4px }
  .objectives::-webkit-scrollbar-track { background: transparent }
  .objectives::-webkit-scrollbar-thumb { background: var(--line-bright); border-radius: 2px }

  .obj-countdown { padding: 14px 16px 10px; border-bottom: 1px solid var(--line) }
  .obj-countdown-label {
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--mut-light); font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .obj-countdown-label .icon { font-size: 18px; color: var(--frost) }
  .obj-countdown-value {
    font-family: "Space Mono", monospace; font-size: 22px; font-weight: 700;
    color: var(--warn); margin-top: 4px; line-height: 1;
  }
  .obj-countdown-sub { font-size: 10px; color: var(--mut); margin-top: 4px; line-height: 1.3 }

  .obj-section { padding: 12px 16px; border-bottom: 1px solid var(--line) }
  .obj-section:last-child { border-bottom: none }
  .obj-section-head {
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink); font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .obj-section-head .icon {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--line-bright);
    display: grid; place-items: center;
    font-size: 10px; color: var(--mut-light);
  }
  .obj-item {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 11px; color: var(--mut-light); line-height: 1.4;
    margin: 5px 0; padding-left: 2px;
  }
  .obj-bullet {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--mut); flex-shrink: 0; margin-top: 2px;
  }
  .obj-bullet.done { background: var(--good); border-color: var(--good) }
  .obj-item.done { color: var(--good) }
  .obj-item.done .obj-text { text-decoration: line-through; opacity: .6 }
  .obj-optional { color: var(--working); font-size: 10px; font-weight: 600 }

  /* ════════════════════════════════════════════
     RIGHT PANEL — District detail on selection
  ════════════════════════════════════════════ */
  .district-panel {
    position: absolute;
    right: var(--panel-inset); top: var(--panel-top);
    width: var(--panel-w-right);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    opacity: 0; transform: translateY(8px);
    transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 6;
  }
  .district-panel.show { opacity: 1; transform: none; pointer-events: auto }

  .district-title {
    padding: 10px 14px; text-align: center;
    font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
    font-weight: 700; color: var(--ink-bright);
    background: rgba(255,255,255,.03);
    border-bottom: 1px solid var(--line);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .district-body { padding: 12px 14px }
  .district-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin: 4px 0;
  }
  .district-bloc {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--mut-light);
  }
  .district-bloc .dot { width: 8px; height: 8px; border-radius: 50% }
  .district-approval {
    font-family: "Space Mono", monospace; font-size: 20px; font-weight: 700;
    text-align: center; margin: 8px 0 4px;
  }
  .district-approval-label {
    font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
    color: var(--mut); text-align: center;
  }
  .district-concern {
    font-size: 11px; color: var(--mut-light); font-style: italic;
    line-height: 1.4; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--line);
  }
  .district-protection { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line) }
  .district-prot-label {
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--mut); margin-bottom: 4px;
  }
  .district-prot-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; margin: 3px 0;
  }
  .district-prot-item.active { color: var(--good) }
  .district-prot-item.inactive { color: var(--mut) }

  /* ════════════════════════════════════════════
     BOTTOM CARD TRAY — Policy / framing cards
  ════════════════════════════════════════════ */
  .card-tray {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(8,11,16,.95) 0%, rgba(8,11,16,.8) 80%, transparent 100%);
    padding: 8px 16px calc(14px + env(safe-area-inset-bottom, 0px));
    transform: translateY(100%); opacity: 0;
    transition: opacity .35s, transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .card-tray.show { opacity: 1; transform: translateY(0) }

  .card-header {
    display: flex; align-items: baseline; gap: 12px;
    padding: 4px 4px 8px;
    border-bottom: 1px solid var(--line); margin-bottom: 10px;
  }
  .card-phase-label {
    font-size: 9px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--mut); font-weight: 600;
  }
  .card-prompt { font-size: 13px; font-weight: 700; color: var(--ink-bright) }
  .card-options {
    display: flex; gap: 8px; justify-content: center;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card-options::-webkit-scrollbar { display: none }

  .card {
    flex: 0 1 260px; min-width: 200px;
    border: 1px solid var(--line); background: rgba(255,255,255,.02);
    color: var(--ink); font-family: inherit; border-radius: var(--radius);
    padding: 12px 14px; cursor: pointer; text-align: left;
    transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
    display: flex; flex-direction: column; gap: 5px;
    position: relative;
  }
  .card:hover {
    background: rgba(255,255,255,.06); border-color: var(--line-bright);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px -16px rgba(0,0,0,.6);
  }
  .card:focus-visible {
    outline: 1px solid var(--accent); outline-offset: 2px;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--line-bright); opacity: 0; transition: opacity .2s;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card:hover::before { opacity: 1 }

  .card-title { font-size: 12px; font-weight: 700; letter-spacing: .02em; line-height: 1.2 }
  .card-desc { font-size: 10.5px; color: var(--mut-light); line-height: 1.4; flex: 1 }
  .card-budget { font-family: "Space Mono", monospace; font-size: 10px; font-weight: 700 }
  .card-budget.pos { color: var(--good) }
  .card-budget.neg { color: var(--bad) }
  .card-arrows { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px }
  .arr { font-size: 9px; padding: 1px 4px; border-radius: 2px; font-weight: 600 }
  .arr-up { background: rgba(52,211,153,.1); color: var(--good) }
  .arr-down { background: rgba(255,90,82,.1); color: var(--bad) }
  .card-tag { font-size: 9px; padding: 2px 6px; border-radius: 2px; margin-top: 2px; display: inline-block }
  .infra-tag { background: rgba(126,184,212,.1); color: var(--frost) }
  .card-pitch { font-size: 10.5px; color: var(--mut-light); font-style: italic; line-height: 1.3 }
  .card-credit { font-size: 10px; color: var(--accent) }

  .framing-card::before { background: var(--accent); opacity: .6 }
  .framing-card:hover::before { opacity: 1 }

  /* ════════════════════════════════════════════
     CINEMATIC OVERLAY — "LAW PASSED" style
  ════════════════════════════════════════════ */
  .overlay-backdrop {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(8,11,16,.85) 0%, rgba(4,6,9,.97) 70%);
    opacity: 0; transition: opacity .5s;
  }
  .overlay-backdrop.show { opacity: 1 }

  .overlay-panel {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
    max-width: 520px; width: calc(100% - 40px);
    opacity: 0; transition: opacity .5s .1s;
  }
  .overlay-panel.show { opacity: 1 }

  .ov-rule {
    display: flex; align-items: center; gap: 12px;
    margin: 12px auto; width: 240px;
  }
  .ov-rule::before, .ov-rule::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-bright), transparent);
  }
  .ov-rule .diamond {
    width: 5px; height: 5px; background: var(--mut);
    transform: rotate(45deg); flex-shrink: 0;
  }

  .ov-badge {
    font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
    color: var(--mut-light); font-weight: 600;
  }
  .ov-title {
    font-size: 22px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink-bright); margin: 6px 0;
    text-shadow: 0 0 30px rgba(201,164,76,.15);
  }
  .ov-title.golden { color: var(--accent) }
  .ov-title.frost { color: var(--frost) }
  .ov-title.danger { color: var(--bad) }
  .ov-title.success { color: var(--good) }
  .ov-body {
    font-size: 12.5px; color: var(--mut-light); line-height: 1.55;
    max-width: 380px; margin: 0 auto;
  }
  .ov-weather-tag {
    font-family: "Space Mono", monospace; font-size: 10px; font-weight: 700;
    color: var(--warn); letter-spacing: .1em; text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid rgba(232,168,62,.25); border-radius: 2px;
    display: inline-block; margin-top: 10px;
    background: rgba(232,168,62,.05);
  }
  .ov-btn {
    margin-top: 20px; display: inline-block;
    border: 1px solid var(--line-bright); background: transparent;
    color: var(--ink); font-family: inherit; font-size: 11px; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 10px 32px; border-radius: 20px; cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .ov-btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.3) }
  .ov-btn:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px }
  .ov-btn.golden { border-color: rgba(201,164,76,.4); color: var(--accent) }
  .ov-btn.golden:hover { background: rgba(201,164,76,.1) }

  .ov-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--line) }
  .ov-footer-label {
    font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--mut); font-weight: 600;
  }
  .ov-footer-title {
    font-size: 16px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--ink-bright); margin-top: 2px;
  }
  .ov-footer-stats { display: flex; gap: 20px; justify-content: center; margin-top: 8px }
  .ov-footer-stat { text-align: center }
  .ov-footer-stat-val { font-family: "Space Mono", monospace; font-weight: 700; font-size: 16px }
  .ov-footer-stat-val.good { color: var(--good) }
  .ov-footer-stat-val.bad { color: var(--bad) }

  .ov-outcomes { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 12px 0 }
  .ov-outcome {
    font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 2px;
    letter-spacing: .05em; text-transform: uppercase;
  }
  .ov-outcome.bad { background: rgba(255,90,82,.12); color: var(--bad) }
  .ov-outcome.warn { background: rgba(232,168,62,.12); color: var(--warn) }
  .ov-outcome.good { background: rgba(52,211,153,.12); color: var(--good) }

  .end-stats { display: flex; gap: 24px; justify-content: center; margin: 16px 0 }
  .end-stat { text-align: center }
  .end-stat-label {
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--mut); font-weight: 600; display: block; margin-bottom: 2px;
  }
  .end-stat-val { font-family: "Space Mono", monospace; font-weight: 700; font-size: 20px }

  /* ════════════════════════════════════════════
     TOAST — Notifications
  ════════════════════════════════════════════ */
  .toast {
    position: absolute;
    top: var(--panel-top); left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--panel);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 8px 14px; font-size: 11px; font-weight: 600;
    opacity: 0; transition: opacity .3s, transform .3s;
    backdrop-filter: blur(8px); z-index: 15;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }
  .infra-toast { border-left: 2px solid var(--good) }

  /* ════════════════════════════════════════════
     ACCESSIBILITY
  ════════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ════════════════════════════════════════════
     RESPONSIVE
  ════════════════════════════════════════════ */
  @media (max-width: 900px) {
    :root { --panel-w-left: 240px; --panel-w-right: 230px }
  }
  @media (max-width: 700px) {
    :root { --panel-w-left: 200px; --panel-w-right: 200px }
    .topbar-left { min-width: auto }
    .topbar-right { min-width: auto }
    .blocbar { gap: 10px }
    .card { min-width: 170px; flex-basis: 200px }
    .ov-title { font-size: 18px }
  }
  @media (max-width: 500px) {
    .objectives { display: none }
    .district-panel { display: none }
    .blocbar { gap: 6px; padding: 0 8px }
    .blocbar-name { display: none }
    .card { min-width: 150px; flex-basis: 170px }
  }
</style>
</head>
<body>
  <div class="stage">
    <div id="game"></div>
    <div id="hud"></div>
    <div id="overlay"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.88.0/phaser.min.js"></script>
  <script type="module">
    import { boot } from "./ui/shell.js";
    if (document.readyState === "complete" || document.readyState === "interactive") {
      setTimeout(boot, 100);
    } else {
      window.addEventListener("DOMContentLoaded", () => setTimeout(boot, 100));
    }
  </script>
</body>
</html>
