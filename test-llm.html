function buildSystemPrompt() {
  const insightLevel = document.getElementById('cfgInsights').value;
  const insightCtx = INSIGHT_PRESETS[insightLevel] || '';

  // Always provide ALL 19 districts with concern profiles
  const districtList = Object.entries(CONCERN_SCORES).map(([id, c]) => {
    const top = Object.entries(c).sort((a,b) => b[1]-a[1]).map(([k,v]) => `${k}:${v}`).join(', ');
    return `  "${id}" (${DISTRICT_NAMES[id]}): ${top}`;
  }).join('\n');

  return `You are a scoring engine for a city governance game. The player is the Mayor of NYC and just published a social media post.

ALL 19 DISTRICTS AND THEIR CONCERN SCORES (0-10):
${districtList}

IMPORTANT: You MUST use the exact district ID strings shown in quotes above (e.g. "southbronx", "harlem", "midtown"). Do NOT use borough names like "The Bronx" or "Manhattan".

PLAYER INSIGHTS GATHERED SO FAR:
${insightCtx || '(none yet)'}

SCORING RULES:
- Score ALL 19 districts 0-10 based on how well the post addresses each district's specific concerns
- Match the post's topic against each district's concern scores. A post about transit should score highest for districts with high transit concern scores.
- A post that names a specific neighborhood or specific issue scores 7-10 for matching districts
- A post about a general topic (e.g. "infrastructure") scores 3-6 based on each district's concern weight for that topic
- A vague post that says nothing specific scores 0-2 for all districts
- If the player has insights about a district AND the post references that insight, add +2 bonus (cap at 10)
- Generate a 1-sentence reaction quote from a resident of each district that scores 4+
- "overall" = the average of all 19 district scores, rounded to 1 decimal

Respond ONLY with valid JSON, no markdown fences:
{
  "scores": [
    {"district": "southbronx", "score": 7, "resident": "Maria D.", "reaction": "Finally someone sees us."}
  ],
  "overall": 4.2,
  "summary": "one sentence assessment"
}`;
}

async function scorePost(post) {
  const url = document.getElementById('cfgUrl').value;
  const model = document.getElementById('cfgModel').value;
  const systemPrompt = buildSystemPrompt();

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model,
      prompt: `MAYOR'S POST:\n"${post.text}"\n\nScore this post.`,
      system: systemPrompt,
      stream: false,
      options: { temperature: 0.3, num_predict: 2048 },
    }),
  });

  if (!res.ok) throw new Error(`Ollama HTTP ${res.status}`);
  const data = await res.json();
  const raw = data.response || '';

  console.log(`%c[POST #${post.id}] Raw LLM Response`, 'color:#7c8cf8;font-weight:bold', raw);

  const jsonStr = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  let parsed;
  try {
    parsed = JSON.parse(jsonStr);
  } catch (parseErr) {
    console.error(`%c[POST #${post.id}] JSON Parse Failed`, 'color:#ff6b63;font-weight:bold', { raw, cleaned: jsonStr, error: parseErr.message });
    throw new Error(`JSON parse failed: ${parseErr.message}\nRaw: ${raw.slice(0, 200)}`);
  }

  const scores = Array.isArray(parsed.scores) ? parsed.scores : [];
  // Normalize scores: extract numeric values, fill missing districts with 0
  const allIds = Object.keys(CONCERN_SCORES);
  const scoreById = {};
  scores.forEach(s => {
    const val = typeof s.score === 'number' ? s.score : Array.isArray(s.score) ? s.score[0] : parseInt(s.score) || 0;
    scoreById[s.district] = Math.max(scoreById[s.district] || 0, val);
  });
  // Fill missing districts as 0
  allIds.forEach(id => { if (!(id in scoreById)) scoreById[id] = 0; });

  const allScores = Object.values(scoreById).sort((a, b) => b - a);
  const top5 = allScores.slice(0, 5);
  const avgAll = +(allScores.reduce((a,b) => a+b, 0) / allScores.length).toFixed(1);
  const avgTop5 = top5.length > 0 ? +(top5.reduce((a,b) => a+b, 0) / top5.length).toFixed(1) : 0;
  const llmOverall = typeof parsed.overall === 'number' ? parsed.overall : 0;

  const result = {
    scores,
    overall: avgTop5,     // top-5 average: rewards depth without requiring breadth
    avgAll,               // flat average of all 19 for comparison
    llmOverall,           // LLM's self-reported number
    summary: parsed.summary || '',
    raw,
  };

  console.log(`%c[POST #${post.id}] Parsed Result`, 'color:#34d399;font-weight:bold', JSON.parse(JSON.stringify(result)));
  return result;
}

function evaluateResult(post, result) {
  const checks = [];
  let pass = 0, fail = 0, warn = 0;

  // Check overall minimum
  if (result.overall >= post.expectMinOverall) {
    checks.push({ ok: true, msg: `Overall ${result.overall} >= expected min ${post.expectMinOverall}` });
    pass++;
  } else {
    checks.push({ ok: false, msg: `Overall ${result.overall} < expected min ${post.expectMinOverall}` });
    fail++;
  }

  // Check expected rating
  const rating = result.overall >= 7 ? 'RESONATING' : result.overall >= 4 ? 'NOTICED' : 'HOLLOW';
  if (rating === post.expectRating) {
    checks.push({ ok: true, msg: `Rating: ${rating} matches expected` });
    pass++;
  } else {
    checks.push({ ok: false, msg: `Rating: ${rating}, expected ${post.expectRating}` });
    // Rating mismatch is a warn if within 1 band, fail if 2+
    const bands = ['HOLLOW','NOTICED','RESONATING'];
    const diff = Math.abs(bands.indexOf(rating) - bands.indexOf(post.expectRating));
    if (diff > 1) fail++; else warn++;
  }

  // Build score map with normalization (LLM might return names instead of IDs)
  const nameToId = {};
  Object.entries(DISTRICT_NAMES).forEach(([id, name]) => {
    nameToId[name.toLowerCase()] = id;
    nameToId[id.toLowerCase()] = id;
  });
  // Extra aliases for common LLM responses
  nameToId['the bronx'] = 'southbronx';
  nameToId['upper east side'] = 'ues';
  nameToId['lower manhattan'] = 'lowerman';
  nameToId['long island city'] = 'lic';
  nameToId['downtown brooklyn'] = 'dtbk';
  nameToId['north shore'] = 'northshore';
  nameToId['mid-island'] = 'midisland';
  nameToId['south bronx'] = 'southbronx';
  nameToId['jackson heights'] = 'jackson';
  nameToId['crown heights'] = 'crown';
  nameToId['bay ridge'] = 'bayridge';
  nameToId['bed-stuy'] = 'crown'; // closest match in the index.html set
  nameToId['staten island'] = 'northshore';

  const scoreMap = {};
  result.scores.forEach(s => {
    const raw = (s.district || '').toLowerCase().trim();
    const id = nameToId[raw] || raw;
    const score = typeof s.score === 'number' ? s.score : Array.isArray(s.score) ? s.score[0] : 0;
    // Keep highest score if duplicate district
    if (scoreMap[id] === undefined || score > scoreMap[id]) {
      scoreMap[id] = score;
    }
  });

  // Check expected high-scoring districts

  for (const d of post.expectHigh) {
    const s = scoreMap[d];
    if (s !== undefined && s >= 5) {
      checks.push({ ok: true, msg: `${DISTRICT_NAMES[d] || d}: ${s} (expected high)` });
      pass++;
    } else if (s !== undefined) {
      checks.push({ ok: false, msg: `${DISTRICT_NAMES[d] || d}: ${s} (expected ≥5)` });
      warn++;
    } else {
      checks.push({ ok: false, msg: `${DISTRICT_NAMES[d] || d}: not scored (expected high)` });
      warn++;
    }
  }

  // Check expected low-scoring districts
  for (const d of post.expectLow) {
    const s = scoreMap[d];
    if (s === undefined || s <= 3) {
      checks.push({ ok: true, msg: `${DISTRICT_NAMES[d] || d}: ${s ?? '—'} (expected low)` });
      pass++;
    } else {
      checks.push({ ok: false, msg: `${DISTRICT_NAMES[d] || d}: ${s} (expected ≤3)` });
      warn++;
    }
  }

  const status = fail > 0 ? 'fail' : warn > 0 ? 'warn' : 'pass';
  const evaluation = { checks, status, pass, fail, warn };

  const statusColor = status === 'pass' ? '#34d399' : status === 'warn' ? '#ffc24d' : '#ff6b63';
  console.log(
    `%c[POST #${post.id}] Evaluation: ${status.toUpperCase()}`,
    `color:${statusColor};font-weight:bold`,
    JSON.parse(JSON.stringify(evaluation))
  );

  return evaluation;
}

// ── Rendering ──
function renderCards() {
  const container = document.getElementById('cards');
  container.innerHTML = POSTS.map(post => {
    const r = results.get(post.id);
    const statusClass = r ? r.status : 'pending';
    const badgeText = r ? (r.error ? 'ERROR' : r.status.toUpperCase()) : 'PENDING';
    const badgeClass = r ? (r.error ? 'fail' : r.status) : 'pending';

    let bodyHtml = `<div class="post-text">"${post.text}"</div>`;

    // Expected behavior
    bodyHtml += `<div class="expect">
      <div class="label">Expected Concerns</div>
      <div class="chips">${post.expectConcerns.length ? post.expectConcerns.map(c => `<span class="chip">${c}</span>`).join('') : '<span class="chip">none (vague)</span>'}</div>
    </div>`;
    bodyHtml += `<div class="expect">
      <div class="label">Expected Rating: ${post.expectRating} · Min Overall: ${post.expectMinOverall}</div>
      <div class="chips">
        ${post.expectHigh.map(d => `<span class="chip${r && r.eval ? (r.eval.checks.some(c => c.msg.includes(DISTRICT_NAMES[d]||d) && c.ok) ? ' hit' : ' miss') : ''}">${DISTRICT_NAMES[d]||d} ↑</span>`).join('')}
        ${post.expectLow.map(d => `<span class="chip${r && r.eval ? (r.eval.checks.some(c => c.msg.includes(DISTRICT_NAMES[d]||d) && c.ok) ? ' hit' : ' miss') : ''}">${DISTRICT_NAMES[d]||d} ↓</span>`).join('')}
      </div>
    </div>`;

    if (r && !r.error) {
      const rating = r.overall >= 7 ? 'RESONATING' : r.overall >= 4 ? 'NOTICED' : 'HOLLOW';
      const ratingColor = r.overall >= 7 ? 'var(--green)' : r.overall >= 4 ? 'var(--yellow)' : 'var(--red)';
      bodyHtml += `<div style="margin-bottom:10px;font-size:12px"><strong style="color:${ratingColor}">${rating}</strong> · Overall: <strong>${r.overall}</strong>/10 · ${r.summary}</div>`;

      // Score grid
      if (r.scores.length) {
        bodyHtml += `<div class="scores-grid">`;
        r.scores.sort((a,b) => b.score - a.score).forEach(s => {
          const cls = s.score >= 7 ? 'high' : s.score >= 4 ? 'mid' : 'low';
          bodyHtml += `<div class="score-row"><span class="district">${DISTRICT_NAMES[s.district]||s.district}</span><span class="val ${cls}">${s.score}</span></div>`;
        });
        bodyHtml += `</div>`;

        // Reactions
        r.scores.filter(s => s.reaction).slice(0, 3).forEach(s => {
          bodyHtml += `<div class="reaction">${s.resident || 'Resident'} (${DISTRICT_NAMES[s.district]||s.district}): "${s.reaction}"</div>`;
        });
      }

      // Evaluation checks
      if (r.eval) {
        bodyHtml += `<div style="margin-top:10px;font-size:11px">`;
        r.eval.checks.forEach(c => {
          const icon = c.ok ? '✓' : '✗';
          const color = c.ok ? 'var(--green)' : 'var(--red)';
          bodyHtml += `<div style="color:${color};margin:2px 0">${icon} ${c.msg}</div>`;
        });
        bodyHtml += `</div>`;
      }

      bodyHtml += `<span class="toggle-raw" onclick="this.nextElementSibling.classList.toggle('show')">raw response</span>`;
      bodyHtml += `<div class="llm-raw">${escHtml(r.raw || '')}</div>`;
    } else if (r && r.error) {
      bodyHtml += `<div class="err">${escHtml(r.error)}</div>`;
    } else {
      bodyHtml += `<div style="color:var(--mut);font-size:12px">Not yet tested. Click "Run All" or the individual test button.</div>`;
    }

    bodyHtml += `<div style="margin-top:10px"><button onclick="runOne(${post.id})" style="font-size:11px;padding:5px 12px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--ink);border-radius:6px;cursor:pointer;font-family:inherit">Test This Post</button></div>`;

    return `<div class="card ${statusClass}" id="card-${post.id}">
      <div class="card-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="num">#${post.id}</span>
        <span class="title">${escHtml(post.text.slice(0, 80))}${post.text.length > 80 ? '…' : ''}</span>
        <span class="tone">${post.tone}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="card-body">${bodyHtml}</div>
    </div>`;
  }).join('');

  updateSummary();
}

function updateSummary() {
  let passed = 0, warned = 0, failed = 0, pending = 0;
  POSTS.forEach(p => {
    const r = results.get(p.id);
    if (!r) pending++;
    else if (r.error) failed++;
    else if (r.status === 'pass') passed++;
    else if (r.status === 'warn') warned++;
    else if (r.status === 'fail') failed++;
  });
  document.getElementById('sPassed').textContent = passed;
  document.getElementById('sWarned').textContent = warned;
  document.getElementById('sFailed').textContent = failed;
  document.getElementById('sPending').textContent = pending;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Runners ──
async function runOne(postId) {
  const post = POSTS.find(p => p.id === postId);
  if (!post) return;

  // Mark running
  results.set(post.id, { status: 'running' });
  const card = document.getElementById(`card-${post.id}`);
  if (card) {
    card.className = 'card pending open';
    const badge = card.querySelector('.badge');
    if (badge) { badge.className = 'badge running'; badge.textContent = 'RUNNING'; }
  }

  try {
    console.group(`%c[POST #${post.id}] "${post.text.slice(0, 60)}…"`, 'color:#7c8cf8;font-weight:bold');
    console.log('%cRequest', 'color:#8b94a6', { id: post.id, tone: post.tone, phase: post.phase, text: post.text });

    const result = await scorePost(post);
    const evaluation = evaluateResult(post, result);
    const entry = {
      scores: result.scores,
      overall: result.overall,
      summary: result.summary,
      raw: result.raw,
      eval: evaluation,
      status: evaluation.status,
      error: null,
    };
    results.set(post.id, entry);

    // Full structured JSON dump
    console.log(`%c[POST #${post.id}] Full Result JSON`, 'color:#e8c547;font-weight:bold');
    console.log(JSON.stringify({
      postId: post.id,
      text: post.text,
      tone: post.tone,
      phase: post.phase,
      result: { scores: result.scores, overall: result.overall, summary: result.summary },
      evaluation: { status: evaluation.status, pass: evaluation.pass, fail: evaluation.fail, warn: evaluation.warn, checks: evaluation.checks },
    }, null, 2));
    console.groupEnd();
  } catch (err) {
    console.error(`%c[POST #${post.id}] ERROR`, 'color:#ff6b63;font-weight:bold', err.message);
    console.groupEnd();
    results.set(post.id, { error: err.message, status: 'fail' });
  }

  renderCards();
  // Re-open the card we just tested
  const updated = document.getElementById(`card-${post.id}`);
  if (updated) updated.classList.add('open');
}

async function runAll() {
  const btn = document.getElementById('runAll');
  btn.disabled = true;
  const status = document.getElementById('globalStatus');

  for (let i = 0; i < POSTS.length; i++) {
    status.textContent = `Testing ${i + 1}/${POSTS.length}...`;
    await runOne(POSTS[i].id);
    // Small delay between requests to avoid overwhelming Ollama
    if (i < POSTS.length - 1) await new Promise(r => setTimeout(r, 500));
  }

  // Full summary JSON to console
  const summary = POSTS.map(p => {
    const r = results.get(p.id);
    return {
      id: p.id,
      text: p.text.slice(0, 80),
      tone: p.tone,
      status: r?.status || 'pending',
      top5: r?.overall ?? null,
      avgAll: r?.avgAll ?? null,
      rating: r?.overall >= 7 ? 'RESONATING' : r?.overall >= 4 ? 'NOTICED' : r?.overall != null ? 'HOLLOW' : null,
      expectedRating: p.expectRating,
      scores: r?.scores?.map(s => ({ district: s.district, score: s.score })) || [],
      checks: { pass: r?.eval?.pass || 0, warn: r?.eval?.warn || 0, fail: r?.eval?.fail || 0 },
      error: r?.error || null,
    };
  });

  console.log('%c══════ TEST RUN COMPLETE ══════', 'color:#ff9f43;font-weight:bold;font-size:14px');
  console.log(JSON.stringify(summary, null, 2));
  console.table(summary.map(s => ({
    '#': s.id,
    Status: s.status,
    Top5: s.top5,
    AvgAll: s.avgAll,
    Rating: s.rating,
    Expected: s.expectedRating,
    Pass: s.checks.pass,
    Warn: s.checks.warn,
    Fail: s.checks.fail,
  })));

  status.textContent = 'All tests complete.';
  btn.disabled = false;
}

async function runFailing() {
  const failing = POSTS.filter(p => {
    const r = results.get(p.id);
    return r && (r.status === 'fail' || r.status === 'warn' || r.error);
  });

  if (!failing.length) {
    document.getElementById('globalStatus').textContent = 'No failing tests to re-run.';
    return;
  }

  const btn = document.getElementById('runFailing');
  btn.disabled = true;
  const status = document.getElementById('globalStatus');

  for (let i = 0; i < failing.length; i++) {
    status.textContent = `Re-testing ${i + 1}/${failing.length}...`;
    await runOne(failing[i].id);
    if (i < failing.length - 1) await new Promise(r => setTimeout(r, 500));
  }

  status.textContent = `Re-tested ${failing.length} posts.`;
  btn.disabled = false;
}

// ── Boot ──
renderCards();
</script>
